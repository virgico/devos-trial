const {useState,useEffect,useRef,useCallback}=React;

const A={blue:"#3B82F6",purple:"#8B5CF6",green:"#10B981",amber:"#F59E0B",cyan:"#06B6D4",pink:"#EC4899",red:"#EF4444",orange:"#F97316"};

const MODULES_DATA=[
{id:"js",title:"JavaScript fundamentals",icon:"JS",color:A.amber,description:"The language of the web. Runs in every browser and on servers via Node.js. Used for interactive UIs, REST APIs, automation scripts, and virtually everything in the modern web stack — if you only learn one language, make it this.",lessons:[
{id:"js1",title:"Variables & data types",content:"**Variables** are containers for storing data. JavaScript has three ways to declare them:\n\n`let` — use this for values that will change\n`const` — use this for values that won't change (most of the time, use this)\n`var` — the old way, avoid it\n\n```js\nconst name = \"Alex\";    // string\nlet age = 25;           // number\nconst isDevOS = true;   // boolean\nlet skills = [];        // array\nconst user = {};        // object\n```\n\n**Why does this matter?** Every program you'll ever write stores and manipulates data. Understanding types prevents bugs — like accidentally adding a string to a number (\"5\" + 3 = \"53\" not 8).",challenge:{prompt:"Declare a constant called `language` set to \"JavaScript\", and a variable called `year` set to 2026.",check:c=>c.includes("const")&&c.includes("language")&&c.includes("JavaScript")&&c.includes("let")&&c.includes("year")&&c.includes("2026"),hint:"Use const for language (it won't change) and let for year."}},
{id:"js2",title:"Functions",content:"**Functions** are reusable blocks of code. Think of them as machines — you put something in, they do work, and give something back.\n\n```js\n// Function declaration\nfunction greet(name) {\n  return \"Hello, \" + name;\n}\n\n// Arrow function (modern, shorter)\nconst greet = (name) => {\n  return \"Hello, \" + name;\n};\n\n// Even shorter for one-liners\nconst greet = (name) => \"Hello, \" + name;\n```\n\n**Key concepts:**\n• **Parameters** — the inputs (name in the example)\n• **Return value** — what the function gives back\n• **Calling** — using the function: greet(\"Alex\")\n\n**Why arrow functions?** They're shorter, and they handle `this` differently (important later with React). Most modern code uses them.",challenge:{prompt:"Write an arrow function called `double` that takes a number and returns it multiplied by 2.",check:c=>c.includes("double")&&c.includes("=>")&&(c.includes("* 2")||c.includes("*2")),hint:"const double = (num) => num * 2;"}},
{id:"js3",title:"Arrays & iteration",content:"**Arrays** are ordered lists. They're everywhere in web dev — user lists, shopping carts, API responses.\n\n```js\nconst fruits = [\"apple\", \"banana\", \"cherry\"];\nfruits[0]; // \"apple\" (zero-indexed!)\nfruits.length; // 3\n```\n\n**The big three methods** you'll use constantly:\n\n```js\n// .map() — transform every item\nconst upper = fruits.map(f => f.toUpperCase());\n\n// .filter() — keep items that pass a test\nconst long = fruits.filter(f => f.length > 5);\n\n// .find() — get the first match\nconst b = fruits.find(f => f.startsWith(\"b\"));\n```\n\nThese are **non-destructive** — they return new arrays and don't change the original. This matters a LOT in React.",challenge:{prompt:"Given `const nums = [1, 2, 3, 4, 5]`, use .filter() to create a new array called `evens` containing only the even numbers.",check:c=>c.includes("filter")&&(c.includes("% 2")||c.includes("% 2 === 0")),hint:"Use the modulo operator: n % 2 === 0 means the number is even."}},
{id:"js4",title:"Objects & destructuring",content:"**Objects** store data as key-value pairs. They're how you model real-world things.\n\n```js\nconst user = {\n  name: \"Alex\",\n  age: 25,\n  skills: [\"JS\", \"React\"],\n  isActive: true\n};\n\nuser.name;        // \"Alex\"\nuser[\"age\"];      // 25\n```\n\n**Destructuring** lets you unpack values cleanly:\n\n```js\nconst { name, age, skills } = user;\n```\n\nYou'll see destructuring EVERYWHERE in React:\n```js\nfunction Profile({ name, age }) {\n  return <h1>{name}, {age}</h1>;\n}\n```",challenge:{prompt:"Create an object called `dev` with properties: name (string), level (number), and languages (array with at least 2 items). Then destructure `name` and `level` from it.",check:c=>c.includes("dev")&&c.includes("name")&&c.includes("level")&&c.includes("languages")&&(c.includes("const {")||c.includes("let {")),hint:"Create the object first, then use const { name, level } = dev;"}},
{id:"js5",title:"Promises & async/await",content:"**Async code** handles things that take time — API calls, database queries, file reads.\n\n```js\nasync function getUsers() {\n  try {\n    const response = await fetch(\"/api/users\");\n    const data = await response.json();\n    console.log(data);\n  } catch (error) {\n    console.error(error);\n  }\n}\n```\n\n**Key ideas:**\n• `async` marks a function as asynchronous\n• `await` pauses until the promise resolves\n• `try/catch` handles errors\n\nEvery API call in your full-stack apps will use this pattern.",challenge:{prompt:"Write an async function called `fetchData` that uses await with fetch(\"/api/data\") and returns the parsed JSON.",check:c=>c.includes("async")&&c.includes("fetchData")&&c.includes("await")&&c.includes("fetch")&&c.includes("json"),hint:"async function fetchData() { const res = await fetch('/api/data'); return await res.json(); }"}},
]},
{id:"ts",title:"TypeScript essentials",icon:"TS",color:A.blue,description:"JavaScript with compile-time safety. The standard in any team codebase — React apps, Node APIs, and Angular projects. Catches type errors before your code runs, saving hours of debugging in larger apps.",lessons:[
{id:"ts1",title:"Why TypeScript & basic types",content:"**TypeScript** is JavaScript with types. It catches bugs BEFORE your code runs.\n\n```ts\nfunction add(a: number, b: number): number {\n  return a + b;\n}\nadd(\"5\", 3); // ERROR!\n```\n\n**Basic types:**\n```ts\nlet name: string = \"Alex\";\nlet age: number = 25;\nlet active: boolean = true;\nlet items: string[] = [\"a\", \"b\"];\n```\n\n**Why bother?** In a 50-line script, types feel like overhead. In a 5,000-line app, they save hours of debugging.",challenge:{prompt:"Write a function called `multiply` with type annotations: takes two numbers, returns a number.",check:c=>c.includes("multiply")&&c.includes(": number")&&(c.match(/number/g)?.length>=2),hint:"function multiply(a: number, b: number): number { return a * b; }"}},
{id:"ts2",title:"Interfaces & type aliases",content:"**Interfaces** define the shape of objects — contracts your data must follow.\n\n```ts\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  isAdmin?: boolean; // optional\n}\n\ntype Status = \"active\" | \"inactive\" | \"banned\";\n```\n\n**When to use which?**\n• Interface — for object shapes (most of the time)\n• Type — for unions, primitives, or complex types",challenge:{prompt:"Create an interface called `Project` with: id (number), title (string), completed (boolean), and optional tags (string array).",check:c=>c.includes("interface")&&c.includes("Project")&&c.includes("id")&&c.includes("title")&&c.includes("completed")&&c.includes("tags")&&c.includes("?"),hint:"Use ? for optional: tags?: string[]"}},
{id:"ts3",title:"Generics",content:"**Generics** let you write reusable code that works with any type — without losing type safety.\n\n```ts\nfunction identity<T>(value: T): T {\n  return value;\n}\n\nidentity<string>(\"hello\"); // string\nidentity<number>(42);      // number\n```\n\nYou'll see generics all over React:\n```ts\nconst [count, setCount] = useState<number>(0);\nconst ref = useRef<HTMLDivElement>(null);\n```\n\nAnd in utility functions:\n```ts\nfunction first<T>(arr: T[]): T | undefined {\n  return arr[0];\n}\n```\n\n**Why generics?** Without them you'd write a separate function for every type, or fall back to `any` — which throws away all type checking.",challenge:{prompt:"Write a generic function called `wrap` that takes any value and returns it inside an array. E.g. wrap(5) → [5], wrap('hi') → ['hi'].",check:c=>c.includes("wrap")&&c.includes("<T>")&&(c.includes("T[]")||c.includes("Array<T>"))&&(c.includes("return [")|| c.includes("return[")),hint:"function wrap<T>(value: T): T[] { return [value]; }"}},
{id:"ts4",title:"Utility types",content:"TypeScript ships with built-in types that transform other types — no need to write them yourself.\n\n```ts\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  password: string;\n}\n\ntype UserUpdate = Partial<User>;             // all fields optional\ntype PublicUser  = Pick<User, \"id\" | \"name\">;// only those fields\ntype SafeUser    = Omit<User, \"password\">;   // exclude one field\ntype Flags       = Record<string, boolean>;  // key→value map\n```\n\n**When you'll reach for them:**\n• `Partial` — PATCH/update endpoints where not all fields are required\n• `Pick` / `Omit` — shaping API responses so you don't leak sensitive data\n• `Record` — feature flags, lookup tables, config objects",challenge:{prompt:"Define an interface `Task` with id, title, done, and priority. Then create a type `NewTask` using Omit that excludes the id field.",check:c=>c.includes("interface")&&c.includes("Task")&&c.includes("Omit")&&c.includes("NewTask")&&c.includes("id"),hint:"interface Task { id: number; title: string; done: boolean; priority: number; }\ntype NewTask = Omit<Task, 'id'>;"}},
{id:"ts5",title:"Type narrowing & guards",content:"**Narrowing** is how TypeScript refines a broad type to a more specific one inside a conditional — giving you the right methods and properties automatically.\n\n```ts\nfunction process(value: string | number) {\n  if (typeof value === \"string\") {\n    return value.toUpperCase(); // TS knows: string\n  }\n  return value * 2; // TS knows: number\n}\n```\n\n**Custom type guard** — a function that narrows for you:\n```ts\nfunction isString(val: unknown): val is string {\n  return typeof val === \"string\";\n}\n```\n\n**Narrowing techniques:**\n• `typeof` — primitives (string, number, boolean)\n• `instanceof` — class instances (Date, Error)\n• `in` — check if an object has a property\n• Custom guards — anything more complex",challenge:{prompt:"Write a function `isString` that takes a parameter typed as `unknown` and returns `val is string` — use typeof inside.",check:c=>c.includes("isString")&&c.includes("is string")&&c.includes("typeof")&&c.includes("unknown"),hint:"function isString(val: unknown): val is string { return typeof val === 'string'; }"}},
]},
{id:"react",title:"React deep dive",icon:"Re",color:A.cyan,description:"The dominant library for building user interfaces. Used for SPAs, dashboards, and apps at every scale — from solo side projects to products at Meta and Airbnb. If you want to build something users interact with in a browser, React is the practical place to start.",lessons:[
{id:"r1",title:"Components & JSX",content:"**React components** are functions that return UI. Everything in React is a component.\n\n```jsx\nfunction UserCard({ user }) {\n  return (\n    <div className=\"card\">\n      <h2>{user.name}</h2>\n      <p>{user.isAdmin ? \"Admin\" : \"User\"}</p>\n    </div>\n  );\n}\n```\n\n**Key rules:**\n• Component names are PascalCase\n• Must return ONE root element\n• Use className not class\n• Curly braces {} for JS expressions",challenge:{prompt:"Write a React component called `Badge` that takes `label` and `color` as props and renders a span with the label text.",check:c=>c.includes("Badge")&&(c.includes("{ label")||c.includes("{label"))&&c.includes("span")&&c.includes("return"),hint:"function Badge({ label, color }) { return <span style={{color}}>{label}</span>; }"}},
{id:"r2",title:"useState & state management",content:"**State** is data that changes over time. When state changes, React re-renders.\n\n```jsx\nimport { useState } from \"react\";\n\nfunction Counter() {\n  const [count, setCount] = useState(0);\n  return (\n    <div>\n      <p>Count: {count}</p>\n      <button onClick={() => setCount(count + 1)}>Add</button>\n    </div>\n  );\n}\n```\n\n**Rules of state:**\n• Never modify directly (count++ is WRONG)\n• Always use the setter function\n• State updates trigger re-renders",challenge:{prompt:"Write a useState hook that tracks a `score` starting at 0, and a function called `addPoints` that increases it by 10.",check:c=>c.includes("useState")&&c.includes("score")&&c.includes("setScore")&&(c.includes("+ 10")||c.includes("+10")),hint:"const [score, setScore] = useState(0); const addPoints = () => setScore(score + 10);"}},
{id:"r3",title:"useEffect & side effects",content:"**useEffect** runs code after a render — for data fetching, subscriptions, and anything that reaches outside React.\n\n```jsx\nuseEffect(() => {\n  document.title = `Score: ${score}`;\n}, [score]); // re-runs whenever score changes\n```\n\n**Data fetching pattern:**\n```jsx\nconst [users, setUsers] = useState([]);\n\nuseEffect(() => {\n  fetch(\"/api/users\")\n    .then(r => r.json())\n    .then(data => setUsers(data));\n}, []); // empty array = run once on mount\n```\n\n**The dependency array:**\n• `[]` — run once on mount\n• `[value]` — run when value changes\n• no array — run after every render (rarely what you want)\n\n**Cleanup** — return a function to tear down subscriptions/timers:\n```jsx\nuseEffect(() => {\n  const id = setInterval(tick, 1000);\n  return () => clearInterval(id);\n}, []);",challenge:{prompt:"Write a useEffect that sets document.title to 'Items: ' + count whenever count changes. Assume count is already declared.",check:c=>c.includes("useEffect")&&c.includes("document.title")&&c.includes("count")&&c.includes("[count]"),hint:"useEffect(() => { document.title = 'Items: ' + count; }, [count]);"}},
{id:"r4",title:"useRef & DOM access",content:"**useRef** gives you a mutable value that persists across renders WITHOUT triggering a re-render.\n\n**1. Access a DOM element directly:**\n```jsx\nconst inputRef = useRef(null);\n\nfunction focusInput() {\n  inputRef.current.focus();\n}\n\nreturn <input ref={inputRef} />;\n```\n\n**2. Store a value without causing re-renders:**\n```jsx\nconst timerRef = useRef(null);\n\nuseEffect(() => {\n  timerRef.current = setInterval(tick, 1000);\n  return () => clearInterval(timerRef.current);\n}, []);\n```\n\n**useState vs useRef:**\n• useState — triggers a re-render when it changes (use for UI data)\n• useRef — does NOT re-render (use for refs, timers, prev values)",challenge:{prompt:"Write a React component `AutoFocus` with an input that automatically gets focused when the component mounts. Use useRef and useEffect.",check:c=>c.includes("useRef")&&c.includes("useEffect")&&c.includes(".focus")&&c.includes("ref"),hint:"const ref = useRef(null); useEffect(() => { ref.current.focus(); }, []); return <input ref={ref} />;"}},
{id:"r5",title:"Custom hooks",content:"**Custom hooks** extract and share stateful logic between components. Any function starting with `use` that calls other hooks is a custom hook.\n\n```jsx\nfunction useCounter(initial = 0) {\n  const [count, setCount] = useState(initial);\n  const increment = () => setCount(c => c + 1);\n  const reset     = () => setCount(initial);\n  return { count, increment, reset };\n}\n\n// Use it in any component:\nfunction App() {\n  const { count, increment } = useCounter(10);\n  return <button onClick={increment}>{count}</button>;\n}\n```\n\n**When to extract a custom hook:**\n• The same useState + useEffect logic appears in multiple components\n• The logic is complex enough to deserve a name\n• You want to test it separately from UI\n\nCommon hooks you'll build: `useLocalStorage`, `useFetch`, `useDebounce`, `useOnClickOutside`.",challenge:{prompt:"Write a custom hook `useToggle` that takes an initial boolean (default false) and returns [value, toggle] — where toggle flips the current value.",check:c=>c.includes("useToggle")&&c.includes("useState")&&(c.includes("!v")||c.includes("!value")||c.includes("prev =>"))&&c.includes("return"),hint:"function useToggle(initial = false) { const [value, setValue] = useState(initial); const toggle = () => setValue(v => !v); return [value, toggle]; }"}},
]},
{id:"node",title:"Node.js & Express",icon:"No",color:A.green,description:"JavaScript on the server. Used to build REST APIs, webhooks, CLI tools, and real-time services. The back-end layer of most JS full-stack apps — pair it with React on the front and PostgreSQL as the database and you have a complete production stack.",lessons:[
{id:"n1",title:"Express basics & routing",content:"**Express** is the most popular Node.js framework for building APIs.\n\n```js\nconst express = require(\"express\");\nconst app = express();\n\napp.get(\"/api/users\", (req, res) => {\n  res.json([{ id: 1, name: \"Alex\" }]);\n});\n\napp.post(\"/api/users\", (req, res) => {\n  const { name, email } = req.body;\n  res.status(201).json({ id: 2, name, email });\n});\n```\n\n**The pattern:** Every route has a METHOD, a PATH, and a HANDLER.",challenge:{prompt:"Write an Express GET route for \"/api/products\" that returns a JSON array with two product objects.",check:c=>c.includes("app.get")&&c.includes("/api/products")&&c.includes("res.json")&&c.includes("["),hint:"app.get('/api/products', (req, res) => { res.json([{id:1, name:'Widget'}]); });"}},
{id:"n2",title:"Middleware & error handling",content:"**Middleware** functions run between a request arriving and your route handler — they form a pipeline.\n\n```js\n// Signature: (req, res, next)\nconst logger = (req, res, next) => {\n  console.log(`${req.method} ${req.url}`);\n  next(); // MUST call next() or the request hangs\n};\napp.use(logger);\n```\n\n**Error-handling middleware** takes 4 arguments:\n```js\napp.use((err, req, res, next) => {\n  console.error(err.message);\n  res.status(err.status || 500).json({ error: err.message });\n});\n```\n\n**Order matters** — define error middleware LAST, after all routes. Common built-ins: `express.json()` (parse request body), `cors()` (allow cross-origin requests).",challenge:{prompt:"Write middleware called `authCheck` that checks for an `authorization` header. If missing, send a 401 JSON response. Otherwise call next().",check:c=>c.includes("authCheck")&&c.includes("req")&&c.includes("next")&&(c.includes("authorization")||c.includes("Authorization"))&&c.includes("401"),hint:"const authCheck = (req, res, next) => { if (!req.headers.authorization) return res.status(401).json({error:'Unauthorized'}); next(); };"}},
{id:"n3",title:"Environment variables & config",content:"**Environment variables** keep secrets and configuration out of your source code. Never hardcode API keys, database passwords, or ports.\n\n```js\n// .env file (never commit this — add to .gitignore)\nPORT=3000\nDB_URL=postgres://localhost/mydb\nJWT_SECRET=supersecret123\n\n// In your app\nrequire('dotenv').config();\n\nconst port   = process.env.PORT || 3000;    // fallback for dev\nconst dbUrl  = process.env.DB_URL;          // required — crash if missing\n```\n\n**Setup:**\n```bash\nnpm install dotenv\n```\n\n**Best practices:**\n• Always provide sensible defaults for non-secret vars\n• Throw an error on startup if required secrets are missing\n• Commit a `.env.example` file so teammates know which vars they need",challenge:{prompt:"Write a function `getConfig` that reads PORT (default 3000) and NODE_ENV (default 'development') from process.env and returns them as an object.",check:c=>c.includes("getConfig")&&c.includes("process.env")&&(c.includes("PORT")||c.includes("port"))&&(c.includes("NODE_ENV")||c.includes("env")),hint:"function getConfig() { return { port: process.env.PORT || 3000, env: process.env.NODE_ENV || 'development' }; }"}},
{id:"n4",title:"Database queries with pg",content:"**pg** is the standard PostgreSQL client for Node. You create a connection pool and run parameterized queries.\n\n```js\nconst { Pool } = require('pg');\nconst pool = new Pool({ connectionString: process.env.DB_URL });\n\nasync function getUserById(id) {\n  const result = await pool.query(\n    'SELECT * FROM users WHERE id = $1',\n    [id]  // $1 is replaced with the actual value\n  );\n  return result.rows[0]; // rows is always an array\n}\n```\n\n**Why `$1` placeholders?** String interpolation → SQL injection. Always use parameterized queries.\n\n```js\nasync function createUser(name, email) {\n  const { rows } = await pool.query(\n    'INSERT INTO users (name, email) VALUES ($1, $2) RETURNING *',\n    [name, email]\n  );\n  return rows[0];\n}",challenge:{prompt:"Write an async function `getPostsByUser` that takes a userId and queries 'SELECT * FROM posts WHERE user_id = $1'. Return result.rows.",check:c=>c.includes("getPostsByUser")&&(c.includes("pool")||c.includes("query"))&&c.includes("$1")&&c.includes("rows"),hint:"async function getPostsByUser(userId) { const result = await pool.query('SELECT * FROM posts WHERE user_id = $1', [userId]); return result.rows; }"}},
{id:"n5",title:"JWT authentication",content:"**JWT (JSON Web Token)** is the standard for API authentication. The server signs a token on login; the client sends it back with every protected request.\n\n```js\nconst jwt = require('jsonwebtoken');\n\n// On login — create and return a token\nconst token = jwt.sign(\n  { userId: user.id, role: user.role },\n  process.env.JWT_SECRET,\n  { expiresIn: '7d' }\n);\n\n// Middleware — verify on protected routes\nconst requireAuth = (req, res, next) => {\n  const token = req.headers.authorization?.split(' ')[1];\n  if (!token) return res.status(401).json({ error: 'No token' });\n  try {\n    req.user = jwt.verify(token, process.env.JWT_SECRET);\n    next();\n  } catch {\n    res.status(401).json({ error: 'Invalid token' });\n  }\n};\n```\n\n**Flow:** POST /login → receive token → send `Authorization: Bearer <token>` with every subsequent request.",challenge:{prompt:"Write Express middleware `requireAuth` that reads a Bearer token from the Authorization header and returns 401 if it's missing. If present, call next().",check:c=>c.includes("requireAuth")&&(c.includes("authorization")||c.includes("Authorization"))&&c.includes("401")&&c.includes("next")&&c.includes("split"),hint:"const requireAuth = (req, res, next) => { const token = req.headers.authorization?.split(' ')[1]; if (!token) return res.status(401).json({error:'No token'}); next(); };"}},
]},
{id:"sql",title:"PostgreSQL mastery",icon:"PG",color:A.purple,description:"The most widely-used open-source relational database. Powers every serious web app — users, orders, products, and posts all live here. Understanding SQL means understanding how data is actually read and written in production.",lessons:[
{id:"sq1",title:"SELECT queries & filtering",content:"**SQL** is the language of databases. Every web app talks to a database with SQL.\n\n```sql\nSELECT * FROM users;\nSELECT name, email FROM users WHERE age > 25;\nSELECT * FROM users WHERE role = 'admin' ORDER BY created_at DESC;\nSELECT * FROM users LIMIT 10;\n```\n\n**Key operators:**\n• = equals, != not equals\n• >, <, >=, <= comparisons\n• AND, OR combine conditions\n• LIKE for pattern matching\n• IN for multiple values",challenge:{prompt:"Write a SELECT query that gets name and email of all users where role is 'admin', ordered by name.",check:c=>{const l=c.toLowerCase();return l.includes("select")&&l.includes("name")&&l.includes("email")&&l.includes("from users")&&l.includes("admin")&&l.includes("order by");},hint:"SELECT name, email FROM users WHERE role = 'admin' ORDER BY name ASC;"}},
{id:"sq2",title:"JOINs",content:"**JOINs** combine rows from two tables based on a related column. This is how you retrieve connected data.\n\n```sql\n-- INNER JOIN: only rows that match in BOTH tables\nSELECT users.name, orders.total\nFROM users\nINNER JOIN orders ON orders.user_id = users.id;\n\n-- LEFT JOIN: all rows from users, even those with no orders\nSELECT users.name, orders.total\nFROM users\nLEFT JOIN orders ON orders.user_id = users.id;\n```\n\n**INNER vs LEFT:**\n• INNER — only matched rows (user must have an order to appear)\n• LEFT — all left-table rows, NULLs where no match exists\n\n**Aliases keep it readable:**\n```sql\nSELECT u.name, o.total\nFROM users u\nJOIN orders o ON o.user_id = u.id\nWHERE o.total > 100;",challenge:{prompt:"Write a query that selects product name and category name by joining a products table to a categories table (products.category_id = categories.id).",check:c=>{const l=c.toLowerCase();return l.includes("join")&&l.includes("products")&&l.includes("categories")&&l.includes("category_id");},hint:"SELECT products.name, categories.name FROM products JOIN categories ON products.category_id = categories.id;"}},
{id:"sq3",title:"Aggregations & GROUP BY",content:"**Aggregate functions** compute a single value from many rows.\n\n```sql\nSELECT COUNT(*) FROM users;          -- total row count\nSELECT AVG(salary) FROM employees;   -- average salary\nSELECT SUM(total) FROM orders;       -- total revenue\nSELECT MAX(price) FROM products;     -- most expensive item\n```\n\n**GROUP BY** — run the aggregate per group:\n```sql\nSELECT department, COUNT(*) AS headcount, AVG(salary)\nFROM employees\nGROUP BY department;\n```\n\n**HAVING** — filter after grouping (WHERE filters before grouping):\n```sql\nSELECT user_id, COUNT(*) AS order_count\nFROM orders\nGROUP BY user_id\nHAVING COUNT(*) > 5;\n```\n\nYou'll use aggregations constantly for dashboards, reports, and analytics.",challenge:{prompt:"Write a query counting orders per user_id from an orders table. Show user_id and order_count. Only include users with more than 2 orders.",check:c=>{const l=c.toLowerCase();return l.includes("count")&&l.includes("group by")&&l.includes("having")&&l.includes("orders");},hint:"SELECT user_id, COUNT(*) AS order_count FROM orders GROUP BY user_id HAVING COUNT(*) > 2;"}},
{id:"sq4",title:"Indexes & performance",content:"**Indexes** are the main way to make queries fast. Without them, Postgres scans every row for every query.\n\n```sql\n-- Basic index on a frequently queried column\nCREATE INDEX idx_users_email ON users(email);\n\n-- Unique index (also enforces uniqueness constraint)\nCREATE UNIQUE INDEX idx_users_email ON users(email);\n\n-- Composite index for common multi-column queries\nCREATE INDEX idx_posts_user_status ON posts(user_id, status);\n```\n\n**Rule of thumb:** index columns you filter by (WHERE), join on, or sort by (ORDER BY).\n\n**EXPLAIN ANALYZE** shows exactly how Postgres runs a query:\n```sql\nEXPLAIN ANALYZE SELECT * FROM users WHERE email = 'a@b.com';\n```\n\n**Don't over-index** — each index slows down writes (INSERT, UPDATE, DELETE) and takes disk space.",challenge:{prompt:"Write SQL to create an index on the posts table for the user_id column. Then write an EXPLAIN query to see how Postgres finds posts by user_id.",check:c=>{const l=c.toLowerCase();return l.includes("create index")&&l.includes("posts")&&l.includes("user_id");},hint:"CREATE INDEX idx_posts_user_id ON posts(user_id);\nEXPLAIN SELECT * FROM posts WHERE user_id = 1;"}},
{id:"sq5",title:"Transactions",content:"**Transactions** group multiple queries into one atomic operation — either ALL succeed or ALL are rolled back. Essential for data integrity.\n\n```sql\nBEGIN;\n\nUPDATE accounts SET balance = balance - 100 WHERE id = 1;\nUPDATE accounts SET balance = balance + 100 WHERE id = 2;\n\nCOMMIT;    -- save both changes\n-- or ROLLBACK; if something went wrong\n```\n\n**In Node.js with pg:**\n```js\nconst client = await pool.connect();\ntry {\n  await client.query('BEGIN');\n  await client.query('UPDATE accounts SET balance = balance - $1 WHERE id = $2', [amount, from]);\n  await client.query('UPDATE accounts SET balance = balance + $1 WHERE id = $2', [amount, to]);\n  await client.query('COMMIT');\n} catch (e) {\n  await client.query('ROLLBACK');\n  throw e;\n} finally {\n  client.release();\n}\n```\n\n**ACID** — transactions guarantee Atomicity, Consistency, Isolation, and Durability.",challenge:{prompt:"Write a SQL transaction that transfers 50 from account id=1 to account id=2. Include BEGIN, two UPDATE statements on a balance column, and COMMIT.",check:c=>{const l=c.toLowerCase();return l.includes("begin")&&(l.match(/update/g)||[]).length>=2&&l.includes("commit")&&l.includes("balance");},hint:"BEGIN;\nUPDATE accounts SET balance = balance - 50 WHERE id = 1;\nUPDATE accounts SET balance = balance + 50 WHERE id = 2;\nCOMMIT;"}},
]},
];

function Markdown({text}){
  const lines=text.split("\n");
  let inCode=false;
  return React.createElement("div",{style:{fontSize:14,lineHeight:1.7,color:"#c8ccd0"}},lines.map((line,i)=>{
    if(line.startsWith("```")){inCode=!inCode;return null;}
    if(inCode)return React.createElement("div",{key:i,style:{fontFamily:"monospace",fontSize:13,color:A.amber,background:"rgba(0,0,0,0.3)",padding:"1px 8px",margin:0}},line);
    if(line.startsWith("**")&&line.endsWith("**"))return React.createElement("p",{key:i,style:{fontWeight:600,color:"#eee",margin:"16px 0 6px"}},line.replace(/\*\*/g,""));
    if(line.startsWith("•"))return React.createElement("div",{key:i,style:{paddingLeft:12,margin:"3px 0"}},renderInline(line));
    if(!line.trim())return React.createElement("div",{key:i,style:{height:8}});
    return React.createElement("p",{key:i,style:{margin:"6px 0"}},renderInline(line));
  }));
}
function renderInline(t){
  return t.split(/(`[^`]+`)/g).map((p,i)=>p.startsWith("`")&&p.endsWith("`")?React.createElement("code",{key:i,style:{background:"rgba(255,255,255,0.08)",padding:"1px 5px",borderRadius:4,fontSize:12,fontFamily:"monospace",color:A.cyan}},p.slice(1,-1)):React.createElement("span",{key:i},p.replace(/\*\*([^*]+)\*\*/g,(_,b)=>b)));
}
