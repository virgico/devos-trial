const A={blue:"#3B82F6",purple:"#8B5CF6",green:"#10B981",amber:"#F59E0B",cyan:"#06B6D4",pink:"#EC4899",red:"#EF4444",orange:"#F97316"};
const dim=c=>c+"18";

const MODULES_DATA=[
{id:"js",title:"JavaScript fundamentals",icon:"JS",color:A.amber,lessons:[
{id:"js1",title:"Variables & data types",content:"**Variables** are containers for storing data. JavaScript has three ways to declare them:\n\n`let` — use this for values that will change\n`const` — use this for values that won't change (most of the time, use this)\n`var` — the old way, avoid it\n\n```js\nconst name = \"Alex\";    // string\nlet age = 25;           // number\nconst isDevOS = true;   // boolean\nlet skills = [];        // array\nconst user = {};        // object\n```\n\n**Why does this matter?** Every program you'll ever write stores and manipulates data. Understanding types prevents bugs — like accidentally adding a string to a number (\"5\" + 3 = \"53\" not 8).",challenge:{prompt:"Declare a constant called `language` set to \"JavaScript\", and a variable called `year` set to 2026.",check:c=>c.includes("const")&&c.includes("language")&&c.includes("JavaScript")&&c.includes("let")&&c.includes("year")&&c.includes("2026"),hint:"Use const for language (it won't change) and let for year."}},
{id:"js2",title:"Functions",content:"**Functions** are reusable blocks of code. Think of them as machines — you put something in, they do work, and give something back.\n\n```js\n// Function declaration\nfunction greet(name) {\n  return \"Hello, \" + name;\n}\n\n// Arrow function (modern, shorter)\nconst greet = (name) => {\n  return \"Hello, \" + name;\n};\n\n// Even shorter for one-liners\nconst greet = (name) => \"Hello, \" + name;\n```\n\n**Key concepts:**\n• **Parameters** — the inputs (name in the example)\n• **Return value** — what the function gives back\n• **Calling** — using the function: greet(\"Alex\")\n\n**Why arrow functions?** They're shorter, and they handle `this` differently (important later with React). Most modern code uses them.",challenge:{prompt:"Write an arrow function called `double` that takes a number and returns it multiplied by 2.",check:c=>c.includes("double")&&c.includes("=>")&&(c.includes("* 2")||c.includes("*2")),hint:"const double = (num) => num * 2;"}},
{id:"js3",title:"Arrays & iteration",content:"**Arrays** are ordered lists. They're everywhere in web dev — user lists, shopping carts, API responses.\n\n```js\nconst fruits = [\"apple\", \"banana\", \"cherry\"];\nfruits[0]; // \"apple\" (zero-indexed!)\nfruits.length; // 3\n```\n\n**The big three methods** you'll use constantly:\n\n```js\n// .map() — transform every item\nconst upper = fruits.map(f => f.toUpperCase());\n\n// .filter() — keep items that pass a test\nconst long = fruits.filter(f => f.length > 5);\n\n// .find() — get the first match\nconst b = fruits.find(f => f.startsWith(\"b\"));\n```\n\nThese are **non-destructive** — they return new arrays and don't change the original. This matters a LOT in React.",challenge:{prompt:"Given `const nums = [1, 2, 3, 4, 5]`, use .filter() to create a new array called `evens` containing only the even numbers.",check:c=>c.includes("filter")&&(c.includes("% 2")||c.includes("% 2 === 0")),hint:"Use the modulo operator: n % 2 === 0 means the number is even."}},
{id:"js4",title:"Objects & destructuring",content:"**Objects** store data as key-value pairs. They're how you model real-world things.\n\n```js\nconst user = {\n  name: \"Alex\",\n  age: 25,\n  skills: [\"JS\", \"React\"],\n  isActive: true\n};\n\nuser.name;        // \"Alex\"\nuser[\"age\"];      // 25\n```\n\n**Destructuring** lets you unpack values cleanly:\n\n```js\nconst { name, age, skills } = user;\n```\n\nYou'll see destructuring EVERYWHERE in React:\n```js\nfunction Profile({ name, age }) {\n  return <h1>{name}, {age}</h1>;\n}\n```",challenge:{prompt:"Create an object called `dev` with properties: name (string), level (number), and languages (array with at least 2 items). Then destructure `name` and `level` from it.",check:c=>c.includes("dev")&&c.includes("name")&&c.includes("level")&&c.includes("languages")&&(c.includes("const {")||c.includes("let {")),hint:"Create the object first, then use const { name, level } = dev;"}},
{id:"js5",title:"Promises & async/await",content:"**Async code** handles things that take time — API calls, database queries, file reads.\n\n```js\nasync function getUsers() {\n  try {\n    const response = await fetch(\"/api/users\");\n    const data = await response.json();\n    console.log(data);\n  } catch (error) {\n    console.error(error);\n  }\n}\n```\n\n**Key ideas:**\n• `async` marks a function as asynchronous\n• `await` pauses until the promise resolves\n• `try/catch` handles errors\n\nEvery API call in your full-stack apps will use this pattern.",challenge:{prompt:"Write an async function called `fetchData` that uses await with fetch(\"/api/data\") and returns the parsed JSON.",check:c=>c.includes("async")&&c.includes("fetchData")&&c.includes("await")&&c.includes("fetch")&&c.includes("json"),hint:"async function fetchData() { const res = await fetch('/api/data'); return await res.json(); }"}},
]},
{id:"ts",title:"TypeScript essentials",icon:"TS",color:A.blue,lessons:[
{id:"ts1",title:"Why TypeScript & basic types",content:"**TypeScript** is JavaScript with types. It catches bugs BEFORE your code runs.\n\n```ts\nfunction add(a: number, b: number): number {\n  return a + b;\n}\nadd(\"5\", 3); // ERROR!\n```\n\n**Basic types:**\n```ts\nlet name: string = \"Alex\";\nlet age: number = 25;\nlet active: boolean = true;\nlet items: string[] = [\"a\", \"b\"];\n```\n\n**Why bother?** In a 50-line script, types feel like overhead. In a 5,000-line app, they save hours of debugging.",challenge:{prompt:"Write a function called `multiply` with type annotations: takes two numbers, returns a number.",check:c=>c.includes("multiply")&&c.includes(": number")&&(c.match(/number/g)?.length>=2),hint:"function multiply(a: number, b: number): number { return a * b; }"}},
{id:"ts2",title:"Interfaces & type aliases",content:"**Interfaces** define the shape of objects — contracts your data must follow.\n\n```ts\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  isAdmin?: boolean; // optional\n}\n\ntype Status = \"active\" | \"inactive\" | \"banned\";\n```\n\n**When to use which?**\n• Interface — for object shapes (most of the time)\n• Type — for unions, primitives, or complex types",challenge:{prompt:"Create an interface called `Project` with: id (number), title (string), completed (boolean), and optional tags (string array).",check:c=>c.includes("interface")&&c.includes("Project")&&c.includes("id")&&c.includes("title")&&c.includes("completed")&&c.includes("tags")&&c.includes("?"),hint:"Use ? for optional: tags?: string[]"}},
]},
{id:"react",title:"React deep dive",icon:"Re",color:A.cyan,lessons:[
{id:"r1",title:"Components & JSX",content:"**React components** are functions that return UI. Everything in React is a component.\n\n```jsx\nfunction UserCard({ user }) {\n  return (\n    <div className=\"card\">\n      <h2>{user.name}</h2>\n      <p>{user.isAdmin ? \"Admin\" : \"User\"}</p>\n    </div>\n  );\n}\n```\n\n**Key rules:**\n• Component names are PascalCase\n• Must return ONE root element\n• Use className not class\n• Curly braces {} for JS expressions",challenge:{prompt:"Write a React component called `Badge` that takes `label` and `color` as props and renders a span with the label text.",check:c=>c.includes("Badge")&&(c.includes("{ label")||c.includes("{label"))&&c.includes("span")&&c.includes("return"),hint:"function Badge({ label, color }) { return <span style={{color}}>{label}</span>; }"}},
{id:"r2",title:"useState & state management",content:"**State** is data that changes over time. When state changes, React re-renders.\n\n```jsx\nimport { useState } from \"react\";\n\nfunction Counter() {\n  const [count, setCount] = useState(0);\n  return (\n    <div>\n      <p>Count: {count}</p>\n      <button onClick={() => setCount(count + 1)}>Add</button>\n    </div>\n  );\n}\n```\n\n**Rules of state:**\n• Never modify directly (count++ is WRONG)\n• Always use the setter function\n• State updates trigger re-renders",challenge:{prompt:"Write a useState hook that tracks a `score` starting at 0, and a function called `addPoints` that increases it by 10.",check:c=>c.includes("useState")&&c.includes("score")&&c.includes("setScore")&&(c.includes("+ 10")||c.includes("+10")),hint:"const [score, setScore] = useState(0); const addPoints = () => setScore(score + 10);"}},
]},
{id:"node",title:"Node.js & Express",icon:"No",color:A.green,lessons:[
{id:"n1",title:"Express basics & routing",content:"**Express** is the most popular Node.js framework for building APIs.\n\n```js\nconst express = require(\"express\");\nconst app = express();\n\napp.get(\"/api/users\", (req, res) => {\n  res.json([{ id: 1, name: \"Alex\" }]);\n});\n\napp.post(\"/api/users\", (req, res) => {\n  const { name, email } = req.body;\n  res.status(201).json({ id: 2, name, email });\n});\n```\n\n**The pattern:** Every route has a METHOD, a PATH, and a HANDLER.",challenge:{prompt:"Write an Express GET route for \"/api/products\" that returns a JSON array with two product objects.",check:c=>c.includes("app.get")&&c.includes("/api/products")&&c.includes("res.json")&&c.includes("["),hint:"app.get('/api/products', (req, res) => { res.json([{id:1, name:'Widget'}]); });"}},
]},
{id:"sql",title:"PostgreSQL mastery",icon:"PG",color:A.purple,lessons:[
{id:"sq1",title:"SELECT queries & filtering",content:"**SQL** is the language of databases. Every web app talks to a database with SQL.\n\n```sql\nSELECT * FROM users;\nSELECT name, email FROM users WHERE age > 25;\nSELECT * FROM users WHERE role = 'admin' ORDER BY created_at DESC;\nSELECT * FROM users LIMIT 10;\n```\n\n**Key operators:**\n• = equals, != not equals\n• >, <, >=, <= comparisons\n• AND, OR combine conditions\n• LIKE for pattern matching\n• IN for multiple values",challenge:{prompt:"Write a SELECT query that gets name and email of all users where role is 'admin', ordered by name.",check:c=>{const l=c.toLowerCase();return l.includes("select")&&l.includes("name")&&l.includes("email")&&l.includes("from users")&&l.includes("admin")&&l.includes("order by");},hint:"SELECT name, email FROM users WHERE role = 'admin' ORDER BY name ASC;"}},
]},
];

{id:1,title:"Rock Paper Scissors",difficulty:"easy",skill:"Game / JS",cat:"game",prompt:"Write a function `rps` that takes two moves ('rock', 'paper', 'scissors') and returns 'Player 1', 'Player 2', or 'Draw'.",check:c=>c.includes("rps")&&(c.includes("rock")||c.includes("paper"))&&(c.includes("return")||c.includes("=>")),hint:"Check all win conditions: rock beats scissors, scissors beats paper, paper beats rock."},
{id:2,title:"Dice roller",difficulty:"easy",skill:"Game / JS",cat:"game",prompt:"Write a function `rollDice` that takes a number of sides (default 6) and returns a random integer from 1 to that number.",check:c=>c.includes("rollDice")&&c.includes("Math.random")&&(c.includes("Math.floor")||c.includes("Math.ceil")),hint:"Math.floor(Math.random() * sides) + 1"},
{id:3,title:"Coin flip simulator",difficulty:"easy",skill:"Game / JS",cat:"game",prompt:"Write a function `flipCoins` that takes a number n and returns an object { heads: x, tails: y } after flipping n coins.",check:c=>c.includes("flipCoins")&&c.includes("Math.random")&&c.includes("heads")&&c.includes("tails"),hint:"Loop n times, Math.random() > 0.5 ? heads++ : tails++, return the object."},

{id:24,title:"Sprint capacity planner",difficulty:"medium",skill:"PM / JS",cat:"pm",prompt:"Write `sprintCapacity` that takes { name, hoursPerDay, daysOff } team members and sprintDays. Return total available hours.",check:c=>c.includes("sprintCapacity")&&(c.includes("reduce")||c.includes("forEach")||c.includes("map"))&&(c.includes("hoursPerDay")||c.includes("daysOff")),hint:"Sum each: hoursPerDay * (sprintDays - daysOff)"},
